<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生日祝福与电梯模拟器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <section class="wish" aria-labelledby="wish-title">
      <h1 id="wish-title">给晓宇的生日祝福</h1>
      <p>
        亲爱的晓宇，生日快乐呀！希望你新的一岁可以学会新的知识，体会新的感受。
        祝你健康成长，每天开心充实！
      </p>
    </section>

    <section class="game" aria-labelledby="game-title">
      <h2 id="game-title">在线小游戏：电梯模拟器</h2>

      <div class="elevator-sim" aria-label="电梯控制体验">
        <div class="cab-view">
          <div class="camera" id="camera">
            <img id="scene-image" class="scene-image" src="assets/scenes/floor-1-lobby-v2.jpg" alt="1楼电梯外场景">
            <div class="view-door view-door-left"></div>
            <div class="view-door view-door-right"></div>
          </div>
        </div>

        <aside class="control-panel" aria-label="电梯按键面板">
          <div class="display-wrap">
            <p class="display-label">FLOOR</p>
            <p class="display-floor" id="floor-chip">1</p>
          </div>

          <div class="floor-buttons" id="floor-buttons" aria-label="楼层按钮"></div>

          <div class="action-buttons">
            <button type="button" class="action-btn" id="open-door">开</button>
            <button type="button" class="action-btn" id="close-door">关</button>
          </div>

          <p class="status-light" id="status">IDLE</p>
        </aside>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
